name: Deploy Slides to GitHub Pages

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: ./.github/actions/setup-node

      - name: Build all slides
        run: |
          set -euo pipefail
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          BASE="/${REPO_NAME}"
          OUT_ROOT="$(pwd)/dist"
          rm -rf "$OUT_ROOT"
          mkdir -p "$OUT_ROOT"

          entries=()
          for f in slides/*.md; do
            [ -e "$f" ] || continue
            name="$(basename "$f" .md)"
            echo "::group::Building $name"
            npx slidev build "$f" \
              --base "$BASE/$name/" \
              --out "$OUT_ROOT/$name" \
              --router-mode hash
            echo "::endgroup::"
            entries+=("$name")
          done

          {
            echo '<!doctype html>'
            echo '<html lang="ja"><head><meta charset="utf-8">'
            echo '<title>Slides</title>'
            echo '<style>body{font-family:system-ui,sans-serif;max-width:640px;margin:4rem auto;padding:0 1rem;line-height:1.7}a{color:#0969da}</style>'
            echo '</head><body>'
            echo '<h1>Slides</h1><ul>'
            for name in "${entries[@]}"; do
              echo "<li><a href=\"./${name}/\">${name}</a></li>"
            done
            echo '</ul></body></html>'
          } > "$OUT_ROOT/index.html"

      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
