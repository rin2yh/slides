name: CD

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-node

      - uses: ./.github/actions/build-decks

      - name: Assemble site index
        run: |
          set -euo pipefail
          entries=()
          for d in dist/*/; do
            entries+=("$(basename "$d")")
          done

          {
            echo '<!doctype html>'
            echo '<html lang="ja"><head><meta charset="utf-8">'
            echo '<title>Slides</title>'
            echo '<style>body{font-family:system-ui,sans-serif;max-width:640px;margin:4rem auto;padding:0 1rem;line-height:1.7}a{color:#0969da}</style>'
            echo '</head><body>'
            echo '<h1>Slides</h1><ul>'
            for name in "${entries[@]}"; do
              echo "<li><a href=\"./${name}/\">${name}</a></li>"
            done
            echo '</ul></body></html>'
          } > dist/index.html

      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
