name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: ci-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-node

      - name: Cache Playwright browsers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Chromium for OGP image generation
        run: npx playwright-chromium install --with-deps chromium

      - name: Build all slides
        run: |
          set -euo pipefail
          for f in slides/*.md; do
            [ -e "$f" ] || continue
            name="$(basename "$f" .md)"
            echo "::group::Building $name"
            npx slidev build "$f" --out "dist/$name"
            echo "::endgroup::"
          done

  pages:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-node

      - name: Cache Playwright browsers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Chromium for OGP image generation
        run: npx playwright-chromium install --with-deps chromium

      - name: Build all slides for GitHub Pages
        run: |
          set -euo pipefail
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          BASE="/${REPO_NAME}"
          OUT_ROOT="$(pwd)/dist"
          rm -rf "$OUT_ROOT"
          mkdir -p "$OUT_ROOT"

          for f in slides/*.md; do
            [ -e "$f" ] || continue
            name="$(basename "$f" .md)"
            echo "::group::Building $name"
            # slides/ is shared across decks; reset the ogImage:auto screenshot so it
            # regenerates fresh for this deck instead of reusing the previous deck's.
            rm -f slides/og-image.png
            npx slidev build "$f" \
              --base "$BASE/$name/" \
              --out "$OUT_ROOT/$name" \
              --router-mode hash
            echo "::endgroup::"
          done

          node scripts/gen-index.mjs "$OUT_ROOT"

      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: dist

  deploy:
    needs: pages
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
