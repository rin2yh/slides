name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  build:
    uses: ./.github/workflows/build.yml
    with:
      # CD (workflow_run) が main push の run から成果物を取得する
      upload-artifacts: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
