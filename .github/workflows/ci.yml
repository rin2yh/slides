name: CI

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  decks:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      decks: ${{ steps.list.outputs.decks }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - id: list
        uses: ./.github/actions/list-decks

  build:
    needs: decks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        deck: ${{ fromJSON(needs.decks.outputs.decks) }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-node

      - name: Cache Playwright browsers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Chromium for OGP image generation
        run: npx playwright-chromium install --with-deps chromium

      - name: Build ${{ matrix.deck }}
        env:
          DECK: ${{ matrix.deck }}
        run: |
          set -euo pipefail
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          npm run build -- "${DECK}" \
            --base "/${REPO_NAME}/${DECK}/" \
            --out "$(pwd)/dist/${DECK}" \
            --router-mode hash
