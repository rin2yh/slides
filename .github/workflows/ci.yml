name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  decks:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      decks: ${{ steps.list.outputs.decks }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: List decks
        id: list
        run: |
          set -euo pipefail
          decks='[]'
          if compgen -G 'slides/*.md' > /dev/null; then
            decks="$(basename -s .md slides/*.md | jq -R . | jq -cs .)"
          fi
          echo "decks=$decks" >> "$GITHUB_OUTPUT"

  build:
    needs: decks
    if: needs.decks.outputs.decks != '[]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        deck: ${{ fromJson(needs.decks.outputs.decks) }}
    env:
      DECK: ${{ matrix.deck }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-node

      - name: Build ${{ matrix.deck }}
        run: |
          set -euo pipefail
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          npx slidev build "slides/${DECK}.md" \
            --base "/${REPO_NAME}/${DECK}/" \
            --out "$(pwd)/dist/${DECK}" \
            --router-mode hash

      - name: Upload deck artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: deck-${{ matrix.deck }}
          path: dist/${{ matrix.deck }}

  pages:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - name: Download deck artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: deck-*
          path: dist

      - name: Assemble site index
        run: |
          set -euo pipefail
          for d in dist/deck-*; do
            [ -d "$d" ] || continue
            mv "$d" "dist/${d#dist/deck-}"
          done

          entries=()
          for d in dist/*/; do
            entries+=("$(basename "$d")")
          done

          {
            echo '<!doctype html>'
            echo '<html lang="ja"><head><meta charset="utf-8">'
            echo '<title>Slides</title>'
            echo '<style>body{font-family:system-ui,sans-serif;max-width:640px;margin:4rem auto;padding:0 1rem;line-height:1.7}a{color:#0969da}</style>'
            echo '</head><body>'
            echo '<h1>Slides</h1><ul>'
            for name in "${entries[@]}"; do
              echo "<li><a href=\"./${name}/\">${name}</a></li>"
            done
            echo '</ul></body></html>'
          } > dist/index.html

      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: dist

  deploy:
    needs: pages
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
