name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  decks:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      decks: ${{ steps.list.outputs.decks }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: List slide decks
        id: list
        run: |
          set -euo pipefail
          shopt -s nullglob
          names=()
          for f in slides/*.md; do
            names+=("$(basename "$f" .md)")
          done
          if [ ${#names[@]} -eq 0 ]; then
            # No decks is a contract violation for this repo — fail loudly here
            # instead of emitting [] and letting the build matrix error cryptically.
            echo "::error::no slide decks found under slides/*.md" >&2
            exit 1
          fi
          decks="$(printf '%s\n' "${names[@]}" | jq -Rnc '[inputs]')"
          echo "decks=$decks" >> "$GITHUB_OUTPUT"
          echo "decks: $decks"

  build:
    needs: decks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        deck: ${{ fromJSON(needs.decks.outputs.decks) }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-node

      - name: Cache Playwright browsers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Chromium for OGP image generation
        run: npx playwright-chromium install --with-deps chromium

      - name: Build ${{ matrix.deck }}
        env:
          DECK: ${{ matrix.deck }}
        run: |
          set -euo pipefail
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          npm run build -- "${DECK}" \
            --base "/${REPO_NAME}/${DECK}/" \
            --out "$(pwd)/dist/${DECK}" \
            --router-mode hash

      - name: Upload built deck
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: deck-${{ matrix.deck }}
          path: dist
          if-no-files-found: error

  pages:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      # gen-index.mjs only uses node builtins, so skip npm ci.
      - uses: ./.github/actions/setup-node
        with:
          install: false

      - name: Download built decks
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: deck-*
          path: dist
          merge-multiple: true

      - name: Generate index page
        run: node scripts/gen-index.mjs dist

      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: dist

  deploy:
    needs: pages
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
