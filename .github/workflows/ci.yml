name: CI

on:
  pull_request:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-node

      - name: Build all slides
        run: |
          set -euo pipefail
          for f in slides/*.md; do
            [ -e "$f" ] || continue
            name="$(basename "$f" .md)"
            echo "::group::Building $name"
            npx slidev build "$f" --out "dist/$name"
            echo "::endgroup::"
          done
