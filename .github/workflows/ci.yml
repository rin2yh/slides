name: CI

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  decks:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      decks: ${{ steps.list.outputs.decks }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - id: list
        uses: ./.github/actions/list-decks

  build:
    needs: decks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        deck: ${{ fromJSON(needs.decks.outputs.decks) }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: jdx/mise-action@f10502fc09dadecfefb962fff68ce77213930204 # v4.2.2

      - uses: ./.github/actions/build-deck
        with:
          deck: ${{ matrix.deck }}
