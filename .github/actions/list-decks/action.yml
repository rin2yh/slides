name: List decks
description: Enumerate slide decks under slides/*.md as a JSON array for a build matrix.

outputs:
  decks:
    description: JSON array of deck names (basenames of slides/*.md).
    value: ${{ steps.list.outputs.decks }}

runs:
  using: composite
  steps:
    - name: List slide decks
      id: list
      shell: bash
      run: |
        set -euo pipefail
        shopt -s nullglob
        names=()
        for f in slides/*.md; do
          names+=("$(basename "$f" .md)")
        done
        if [ ${#names[@]} -eq 0 ]; then
          # No decks is a contract violation for this repo — fail loudly here
          # instead of emitting [] and letting the build matrix error cryptically.
          echo "::error::no slide decks found under slides/*.md" >&2
          exit 1
        fi
        decks="$(printf '%s\n' "${names[@]}" | jq -Rnc '[inputs]')"
        echo "decks=$decks" >> "$GITHUB_OUTPUT"
        echo "decks: $decks"
