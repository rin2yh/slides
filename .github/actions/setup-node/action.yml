name: Setup Node
description: Install Node.js and (optionally) npm dependencies

inputs:
  install:
    description: Run `npm ci`. Set to false for jobs that only need Node itself.
    default: 'true'

runs:
  using: composite
  steps:
    - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
      with:
        node-version: 24
        cache: npm

    - if: inputs.install == 'true'
      run: npm ci
      shell: bash
