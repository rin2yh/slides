name: Build deck
description: Build a single Marp deck into dist/<deck>, including its OGP image and shared assets. Assumes the marp CLI is already on PATH.

inputs:
  deck:
    description: Deck name (basename of slides/<deck>.md).
    required: true

runs:
  using: composite
  steps:
    - name: Build ${{ inputs.deck }} HTML
      shell: bash
      env:
        DECK: ${{ inputs.deck }}
      run: |
        OWNER="${GITHUB_REPOSITORY%/*}"
        REPO="${GITHUB_REPOSITORY#*/}"
        DECK_URL="https://${OWNER}.github.io/${REPO}/${DECK}/"
        marp --config-file .marprc.yml \
          "slides/${DECK}.md" \
          --html \
          --url "${DECK_URL}" \
          --og-image "${DECK_URL}og-image.png" \
          --output "dist/${DECK}/index.html"

    - name: Copy shared assets
      shell: bash
      env:
        DECK: ${{ inputs.deck }}
      run: |
        cp -r slides/public "dist/${DECK}/public"
        cp slides/public/favicon.ico "dist/${DECK}/favicon.ico"

    - name: Generate OGP image (first slide)
      shell: bash
      env:
        DECK: ${{ inputs.deck }}
      run: |
        marp --config-file .marprc.yml \
          "slides/${DECK}.md" \
          --image png \
          --allow-local-files \
          --output "dist/${DECK}/og-image.png"
