<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Slides</title>
<link rel="icon" href="./favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fbfaf7;
    --text: #1b1f23;
    --text-2: #5a6066;
    --muted: #7d838a;
    --accent: #0a7c98;
    --accent-hover: #0a6076;
    --panel: #fff;
    --border: #e0dccf;
    --shadow: 0 1px 2px rgba(27, 31, 35, .04);
    --shadow-hover: 0 6px 20px rgba(10, 124, 152, .12);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #14181b;
      --text: #eceef0;
      --text-2: #aab0b6;
      --muted: #858b91;
      --accent: #3fb6d3;
      --accent-hover: #66c9e2;
      --panel: #1c2226;
      --border: #2c343a;
      --shadow: 0 1px 2px rgba(0, 0, 0, .3);
      --shadow-hover: 0 6px 20px rgba(0, 0, 0, .4);
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', system-ui, sans-serif;
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 760px; margin: 0 auto; padding: 5rem 1.25rem 6rem; }
  header { margin-bottom: 2.5rem; }
  .eyebrow {
    font-size: .8rem;
    font-weight: 700;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--accent);
    margin: 0 0 .5rem;
  }
  h1 {
    font-size: 2.4rem;
    font-weight: 900;
    letter-spacing: -.01em;
    margin: 0;
  }
  .lead { color: var(--text-2); margin: .5rem 0 0; }
  ul { list-style: none; margin: 0; padding: 0; display: grid; gap: 1rem; }
  .card {
    display: block;
    padding: 1.25rem 1.4rem;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    text-decoration: none;
    color: inherit;
    box-shadow: var(--shadow);
    transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease;
  }
  .card:hover, .card:focus-visible {
    transform: translateY(-2px);
    border-color: var(--accent);
    box-shadow: var(--shadow-hover);
    outline: none;
  }
  .card-date {
    display: block;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: .8rem;
    color: var(--muted);
    margin-bottom: .35rem;
  }
  .card-title {
    display: block;
    font-size: 1.2rem;
    font-weight: 700;
    letter-spacing: -.01em;
  }
  .card-desc {
    display: block;
    margin-top: .35rem;
    color: var(--text-2);
    font-size: .95rem;
  }
  .card-go {
    display: inline-block;
    margin-top: .75rem;
    color: var(--accent);
    font-size: .9rem;
    font-weight: 500;
  }
  .card:hover .card-go, .card:focus-visible .card-go { color: var(--accent-hover); }
  footer { margin-top: 3rem; color: var(--muted); font-size: .85rem; }
  footer a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <p class="eyebrow">Presentations</p>
      <h1>スライド一覧</h1>
    </header>
    <ul>
      <li>
        <a class="card" href="./go-coverage/">
          <span class="card-date">2026-07-24</span>
          <span class="card-title">なぜGoのカバレッジはstmtとfnなのか</span>
          <span class="card-desc">Asakusa.go #8 発表資料</span>
          <span class="card-go" aria-hidden="true">スライドを開く →</span>
        </a>
      </li>
    </ul>
    <footer>Built with <a href="https://marp.app/">Marp</a></footer>
  </div>
</body>
</html>
